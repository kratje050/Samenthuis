<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#c65d58">
  <meta name="description" content="Samen Thuis: een gratis, offline gezinsagenda en gezinsplanner.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Samen Thuis">
  <title>Samen Thuis</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./assets/icons/icon-192.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/icons/icon-180.png">
  <link rel="stylesheet" href="./css/variables.css">
  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/layout.css">
  <link rel="stylesheet" href="./css/components.css">
  <link rel="stylesheet" href="./css/calendar.css">
  <link rel="stylesheet" href="./css/responsive.css">
</head>
<body>
  <a class="skip-link" href="#main-content">Naar de inhoud</a>
  <div id="app" class="app-shell" aria-busy="true">
    <aside class="side-nav" aria-label="Hoofdnavigatie">
      <a class="brand" href="#home" aria-label="Gezin &amp; Co home">
        <svg class="brand-logo" aria-hidden="true"><use href="./assets/icons/ui-icons.svg#logo"></use></svg>
        <span><strong>Gezin &amp; Co</strong><small>Samen organiseren <span aria-hidden="true">♡</span></small></span>
      </a>
      <nav id="desktop-nav"></nav>
      <div class="sidebar-family">
        <div class="sidebar-family-heading"><span>Gezinsleden</span><a href="#settings">Bewerk</a></div>
        <div id="sidebar-members"></div>
      </div>
      <button class="local-note" id="sidebar-cloud-status" type="button"><span class="status-dot" aria-hidden="true"></span><span>Alleen lokaal op dit apparaat</span></button>
    </aside>
    <div class="app-column">
      <header class="topbar">
        <button class="icon-button mobile-menu-button" id="mobile-menu" type="button" aria-label="Open meer onderdelen"><svg class="ui-icon" aria-hidden="true"><use href="./assets/icons/ui-icons.svg#menu"></use></svg></button>
        <a class="mobile-brand" href="#home" aria-label="Gezin &amp; Co home"><svg class="brand-logo" aria-hidden="true"><use href="./assets/icons/ui-icons.svg#logo"></use></svg><span><strong>Gezin &amp; Co</strong><small>Samen organiseren ♡</small></span></a>
        <div class="page-heading"><p class="eyebrow" id="page-eyebrow">Gezinsplanner</p><h1 id="page-title">Even laden…</h1></div>
        <div class="top-actions">
          <button class="icon-button cloud-button" id="cloud-status" type="button" aria-label="Open gezinsaccount en synchronisatie" data-sync-status="local"><svg class="ui-icon" aria-hidden="true"><use href="./assets/icons/ui-icons.svg#cloud"></use></svg></button>
          <a class="icon-button notification-shortcut" href="#settings" aria-label="Open meldingsinstellingen"><svg class="ui-icon" aria-hidden="true"><use href="./assets/icons/ui-icons.svg#bell"></use></svg></a>
          <button class="icon-button" id="global-search" type="button" aria-label="Zoek in heel Samen Thuis"><svg class="ui-icon" aria-hidden="true"><use href="./assets/icons/ui-icons.svg#search"></use></svg></button>
          <button class="icon-button" id="theme-toggle" type="button" aria-label="Wissel licht en donker thema"><svg class="ui-icon" aria-hidden="true"><use href="./assets/icons/ui-icons.svg#theme"></use></svg></button>
          <a class="avatar-button" href="#settings" aria-label="Open instellingen">ST</a>
          <button class="header-add" id="quick-add" type="button" aria-label="Snel iets toevoegen"><svg class="ui-icon" aria-hidden="true"><use href="./assets/icons/ui-icons.svg#plus"></use></svg></button>
        </div>
      </header>
      <div id="offline-banner" class="status-banner" hidden>Je bent offline. Alles blijft lokaal beschikbaar.</div>
      <div id="update-banner" class="status-banner update" hidden>Er is een nieuwe versie beschikbaar. <button id="apply-update" class="text-button" type="button">Nu bijwerken</button></div>
      <main id="main-content" tabindex="-1"><div class="loading-card">Samen Thuis wordt klaargezet…</div></main>
    </div>
    <nav class="bottom-nav" id="mobile-nav" aria-label="Hoofdnavigatie"></nav>
  </div>
  <div id="modal-root"></div>
  <div id="toast-root" class="toast-region" aria-live="polite" aria-atomic="true"></div>
  <div id="reminder-root" class="reminder-region" aria-live="assertive"></div>
  <noscript>Voor Samen Thuis moet JavaScript ingeschakeld zijn.</noscript>
  <script type="module" src="./js/app.js"></script>
</body>
</html>
