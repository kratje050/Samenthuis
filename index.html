<!doctype html>
<html lang="nl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#6f4e40">
  <meta name="description" content="Samen Thuis: een gratis, offline gezinsagenda en gezinsplanner.">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="Samen Thuis">
  <title>Samen Thuis</title>
  <link rel="manifest" href="./manifest.json">
  <link rel="icon" href="./assets/icons/icon-192.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" sizes="180x180" href="./assets/icons/icon-180.png">
  <link rel="stylesheet" href="./css/variables.css">
  <link rel="stylesheet" href="./css/base.css">
  <link rel="stylesheet" href="./css/layout.css">
  <link rel="stylesheet" href="./css/components.css">
  <link rel="stylesheet" href="./css/calendar.css">
  <link rel="stylesheet" href="./css/responsive.css">
</head>
<body>
  <a class="skip-link" href="#main-content">Naar de inhoud</a>
  <div id="app" class="app-shell" aria-busy="true">
    <aside class="side-nav" aria-label="Hoofdnavigatie">
      <a class="brand" href="#home" aria-label="Samen Thuis home"><span class="brand-mark">ST</span><span>Samen Thuis</span></a>
      <nav id="desktop-nav"></nav>
      <div class="local-note"><span aria-hidden="true">●</span> Alleen lokaal op dit apparaat</div>
    </aside>
    <div class="app-column">
      <header class="topbar">
        <div><p class="eyebrow" id="page-eyebrow">Gezinsplanner</p><h1 id="page-title">Even laden…</h1></div>
        <div class="top-actions"><button class="icon-button cloud-button" id="cloud-status" type="button" aria-label="Open gezinsaccount en synchronisatie" data-sync-status="local">☁</button><button class="icon-button" id="global-search" type="button" aria-label="Zoek in heel Samen Thuis">⌕</button><button class="icon-button" id="theme-toggle" type="button" aria-label="Wissel licht en donker thema">◐</button><a class="avatar-button" href="#settings" aria-label="Open instellingen">ST</a></div>
      </header>
      <div id="offline-banner" class="status-banner" hidden>Je bent offline. Alles blijft lokaal beschikbaar.</div>
      <div id="update-banner" class="status-banner update" hidden>Er is een nieuwe versie beschikbaar. <button id="apply-update" class="text-button" type="button">Nu bijwerken</button></div>
      <main id="main-content" tabindex="-1"><div class="loading-card">Samen Thuis wordt klaargezet…</div></main>
    </div>
    <nav class="bottom-nav" id="mobile-nav" aria-label="Hoofdnavigatie"></nav>
    <button class="fab" id="quick-add" type="button" aria-label="Snel iets toevoegen">＋</button>
  </div>
  <div id="modal-root"></div>
  <div id="toast-root" class="toast-region" aria-live="polite" aria-atomic="true"></div>
  <div id="reminder-root" class="reminder-region" aria-live="assertive"></div>
  <noscript>Voor Samen Thuis moet JavaScript ingeschakeld zijn.</noscript>
  <script type="module" src="./js/app.js"></script>
</body>
</html>
